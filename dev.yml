name: ruby-lsp

nix: true
type: ruby

minimum_dependency_age:
  enforce: true

up:
  - submodules
  - ruby
  - bundler
  - node:
      package_manager: pnpm@10.28.0
      version: 22.21.1
      packages:
        - vscode
  - packages:
      - libyaml

commands:
  server: exe/ruby-lsp
  style: bin/rubocop
  typecheck:
    aliases: ["tc"]
    run: "bundle exec srb tc"
  run_ci:
    run: "bundle exec srb tc &&
      bin/rubocop &&
      bin/test &&
      bundle exec exe/ruby-lsp-check"
  test:
    syntax:
      argument: file
      optional: args...
    run: bin/test

env:
  'RUBY_DEBUG_IRB_CONSOLE': '1'
